workflows:
  android-workflow:
    name: Android Signed APK Build
    environment:
      groups:
        - supabase_creds
      java: 21 
      android_signing:
        - kilogram user
    scripts:
      - name: Install dependencies and build web
        script: |
          npm install
          npm run build
          # 🎯 Generate icons in the cloud environment
          npx @capacitor/assets generate --android 
          npx cap sync android
      - name: Build Signed Android APK
        script: |
          cd android
          chmod +x gradlew
          # 🎯 Clean and build the signed release version
          ./gradlew clean assembleRelease 
    artifacts:
      # 🎯 Fixed: This is the exact path for the signed release APK
      - android/app/build/outputs/apk/release/app-release.apk