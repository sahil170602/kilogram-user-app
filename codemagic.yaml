workflows:
  android-workflow:
    name: Android Signed APK Build
    environment:
      groups:
        - supabase_creds
      java: 21 
      android_signing:
        - kilogram user
    scripts:
      - name: Install dependencies and build web
        script: |
          npm install
          npm run build
          npx @capacitor/assets generate --android 
          npx cap sync android
      - name: Build Signed Android APK
        script: |
          cd android
          # Give execution permissions to the gradle wrapper
          chmod +x gradlew
          # Clean old build data and build the Signed Release APK
          ./gradlew clean assembleRelease 
    artifacts:
      # 🎯 The recursive wildcard (**) ensures Codemagic finds the APK anywhere
      - android/app/build/outputs/apk/**/*.apk