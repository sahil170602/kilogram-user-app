workflows:
  android-workflow:
    name: Android Signed APK Build
    environment:
      groups:
        - supabase_creds
      java: 21 
      android_signing:
        - kilogram user
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm run build
          npx @capacitor/assets generate --android 
          npx cap sync android
      - name: Build Signed Android APK
        script: |
          cd android
          chmod +x gradlew
          # 🎯 This command forces the signing using Codemagic variables
          ./gradlew clean assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk