workflows:
  android-workflow:
    name: Android Signed APK Build
    environment:
      groups:
        - supabase_creds
      java: 21 
      # 🎯 Fixed: Moved inside environment block correctly
      android_signing:
        - kilogram_user
    scripts:
      - name: Install dependencies and build web
        script: |
          npm install
          npm run build
          # 🎯 Generates icons and splash screens in the cloud
          npx @capacitor/assets generate --android 
          npx cap sync android
      - name: Build Signed Android APK
        script: |
          cd android
          chmod +x gradlew
          # 🎯 Fixed: Changed assembleDebug to assembleRelease for signing
          ./gradlew clean assembleRelease 
    artifacts:
      # 🎯 Points to the signed release folder
      - android/app/build/outputs/apk/release/*.apk