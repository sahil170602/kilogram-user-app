workflows:
  android-user-workflow:
    name: Kilogram User - Play Store AAB Build
    environment:
      groups:
        - supabase_creds
      java: 21 
      android_signing:
        - kilogram user
    scripts:
      - name: Install and Build User Web
        script: |
          npm install
          npm run build
          # Generate icons from the local icon.png
          npx @capacitor/assets generate --android 
          npx cap sync android
          
      - name: Build Signed User App Bundle (AAB)
        script: |
          cd android
          chmod +x gradlew
          # 🎯 CHANGED: bundleRelease generates the .aab file for the Play Store
          ./gradlew clean bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEY_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
            
    artifacts:
      # 🎯 CHANGED: Grabbing the .aab file instead of the apk
      - android/app/build/outputs/bundle/release/app-release.aab