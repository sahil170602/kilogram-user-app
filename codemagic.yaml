workflows:
  android-workflow:
    name: Android Signed APK Build
    environment:
      groups:
        - supabase_creds
      java: 21 
      android_signing:
        - kilogram user
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm run build
          # 🎯 This forces the custom icon generation in the cloud
          npx @capacitor/assets generate --android 
          npx cap sync android
      - name: Build Signed Android APK
        script: |
          cd android
          chmod +x gradlew
          # 🎯 This creates the 'app-release.apk' using your certificate
          ./gradlew clean assembleRelease 
    artifacts:
      # 🎯 The '**' makes sure Codemagic finds the file no matter what
      - android/app/build/outputs/apk/**/*.apk