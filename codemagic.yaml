workflows:
  android-workflow:
    name: Android Signed APK Build
    environment:
      groups:
        - supabase_creds
      java: 21 
      android_signing:
        - kilogram user
    scripts:
      - name: Install dependencies and build web
        script: |
          npm install
          npm run build
          # Generate icons in the build environment
          npx @capacitor/assets generate --android 
          npx cap sync android
      - name: Build Signed Android APK
        script: |
          cd android
          chmod +x gradlew
          # 🎯 The 'clean' and 'assembleRelease' will now use your 'kilogram user' keystore
          ./gradlew clean assembleRelease 
    artifacts:
      # 🎯 This ensures Codemagic collects the SIGNED app-release.apk
      - android/app/build/outputs/apk/release/app-release.apk