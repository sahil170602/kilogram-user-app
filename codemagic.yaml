workflows:
  android-workflow:
    name: Android APK Build
    environment:
      groups:
        - supabase_creds
      # 🎯 ADD THESE TWO LINES BELOW
      vars:
        JAVA_VERSION: "21" 
    scripts:
      - name: Set up Java 21
        script: |
          # This command switches the environment to Java 21
          sdk use java 21.0.2-term
      - name: Install dependencies and build web
        script: |
          npm install
          npm run build
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk