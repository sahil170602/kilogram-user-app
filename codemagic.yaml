workflows:
  android-workflow:
    name: Android APK Build
    environment:
      groups:
        - supabase_creds
      # 🎯 This is the correct way to set Java 21 in Codemagic
      java: 21 
    scripts:
      - name: Install dependencies and build web
        script: |
          npm install
          npm run build
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk